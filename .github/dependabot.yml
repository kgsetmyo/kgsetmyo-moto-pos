version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - "next"
          - "eslint-config-next"
      mui:
        patterns:
          - "@mui/*"
          - "@emotion/*"
          - "@base-ui/react"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
