# Pin third-party actions to immutable commit SHAs (see docs/CI.md).
name: Test Audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      CASHIER_EMAIL: ${{ secrets.CASHIER_EMAIL }}
      CASHIER_PASSWORD: ${{ secrets.CASHIER_PASSWORD }}
      TEST_BASE_URL: http://localhost:3000
      SMOKE_INSECURE_TLS: "1"
      CI_SMOKE_NOTE: CI smoke test transaction
      GITHUB_RUN_ID: ${{ github.run_id }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Dependency audit (high+)
        run: npm run audit:ci

      - name: Create .env.local from secrets
        run: |
          {
            echo "DATABASE_URL=$DATABASE_URL"
            echo "DIRECT_URL=$DIRECT_URL"
            echo "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SUPABASE_SERVICE_ROLE_KEY"
            echo "SUPABASE_JWT_SECRET=$SUPABASE_JWT_SECRET"
            echo "ADMIN_EMAIL=$ADMIN_EMAIL"
            echo "ADMIN_PASSWORD=$ADMIN_PASSWORD"
            echo "CASHIER_EMAIL=$CASHIER_EMAIL"
            echo "CASHIER_PASSWORD=$CASHIER_PASSWORD"
            echo "TEST_BASE_URL=$TEST_BASE_URL"
            echo "SMOKE_INSECURE_TLS=$SMOKE_INSECURE_TLS"
            echo "CI_SMOKE_NOTE=$CI_SMOKE_NOTE"
            echo "GITHUB_RUN_ID=$GITHUB_RUN_ID"
          } > .env.local

      - name: Lint and typecheck
        run: npm run lint && npx tsc --noEmit

      - name: Restore Next.js cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**', 'next.config.*', 'tsconfig.json') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build

      - name: Seed test data
        run: npm run seed

      - name: Start server
        run: npm run start &

      - name: Wait for server
        run: npx --no-install wait-on http://localhost:3000 --timeout 60000

      - name: Smoke + security
        run: npm run test:smoke && npm run test:security

      - name: Teardown CI artifacts
        if: always()
        run: npm run test:ci:teardown
